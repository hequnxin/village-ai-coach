<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>村官AI伙伴 · 赋能基层</title>
  <link rel="stylesheet" href="/src/styles/style.css">
</head>
<body>

<button class="menu-toggle" id="menuToggle">☰</button>

  <div id="authContainer" class="auth-container">
    <div class="auth-box">
      <h2>🌾 村官AI伙伴</h2>
      <div class="tab">
        <button id="loginTab" class="active">登录</button>
        <button id="registerTab">注册</button>
      </div>
      <form id="loginForm">
        <input type="text" id="loginUsername" placeholder="用户名" required>
        <input type="password" id="loginPassword" placeholder="密码" required>
        <button type="submit">登录</button>
        <p class="error" id="loginError"></p>
      </form>
      <form id="registerForm" style="display:none;">
        <input type="text" id="registerUsername" placeholder="用户名" required>
        <input type="password" id="registerPassword" placeholder="密码" required>
        <button type="submit">注册</button>
        <p class="error" id="registerError"></p>
      </form>
    </div>
  </div>

  <div id="app" class="app" style="display:none;">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>🌾 村官AI伙伴</h2>
        <button id="newSessionBtn" class="new-session">➕ 新建</button>
      </div>
      <div class="session-tabs">
        <button id="allSessionsTab" class="session-tab active">全部会话</button>
        <button id="favoritesTab" class="session-tab">⭐ 会话收藏</button>
        <button id="messageFavoritesTab" class="session-tab">💬 消息收藏</button>
      </div>
      <div id="sessionList" class="session-list"></div>
      <div id="messageFavoriteList" class="message-favorite-list" style="display: none;"></div>

      <!-- 今日任务容器（动态渲染，无静态标题） -->
      <div id="taskPanel" class="task-panel"></div>

      <div id="sidebarLevelContainer" class="level-progress-container" style="display: none;"></div>
      <div class="user-info">
        <span id="usernameDisplay"></span>
        <button id="logoutBtn">退出</button>
      </div>
    </aside>

    <main class="main-content">
      <nav class="top-nav">
        <button id="navChat" class="nav-btn active">💬 问答</button>
        <button id="navSimulate" class="nav-btn">🎭 模拟对练</button>
        <button id="navMeeting" class="nav-btn">🏛️ 会议模式</button>
        <button id="navKnowledge" class="nav-btn">📚 案例库</button>
        <button id="navGame" class="nav-btn">🎮 挑战中心</button>
        <button id="navProfile" class="nav-btn">👤 我的</button>
      </nav>

      <div id="dynamicContent" class="dynamic-content"></div>
    </main>
  </div>

  <div class="bottom-nav" id="bottomNav">
    <button class="bottom-nav-item" data-view="chat">
      <span class="icon">💬</span>
      <span>问答</span>
    </button>
    <button class="bottom-nav-item" data-view="simulate">
      <span class="icon">🎭</span>
      <span>对练</span>
    </button>
    <button class="bottom-nav-item" data-view="meeting">
      <span class="icon">🏛️</span>
      <span>会议</span>
    </button>
    <button class="bottom-nav-item" data-view="knowledge">
      <span class="icon">📚</span>
      <span>案例</span>
    </button>
    <button class="bottom-nav-item" data-view="game">
      <span class="icon">🎮</span>
      <span>挑战</span>
    </button>
    <button class="bottom-nav-item" data-view="profile">
      <span class="icon">👤</span>
      <span>我的</span>
    </button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
